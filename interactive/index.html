<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RJB Interactive — dev harness</title>
    <style>
      body {
        max-width: 760px;
        margin: 2rem auto;
        padding: 0 1rem 6rem;
        font-family: system-ui, sans-serif;
        color: #222;
      }
      .rjb-viz { margin: 3rem 0; }
      code { background: #f2f2f2; padding: 0 0.3em; border-radius: 3px; }
    </style>
  </head>
  <body>
    <h1>RJB interactive — dev harness</h1>
    <p>
      Each placeholder below is hydrated by the island runtime exactly as the
      <code>[reuben_viz]</code> shortcode renders it in WordPress. Add more
      <code>.rjb-viz</code> divs here to preview other islands.
    </p>

    <div
      class="rjb-viz"
      data-viz="solar-output"
      data-src="/src/viz/solar-output/sample-data.json"
      data-title="Solar generation — 12-month moving average"
    ></div>

    <div class="rjb-viz" data-viz="diamond-gas-sakura"></div>

    <script type="module" src="/src/mount.js"></script>
  </body>
</html>
